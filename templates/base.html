<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}小说助手{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('books.index') }}">
      <span class="brand-dot"></span> 小说助手
    </a>
    <div class="d-flex ms-auto align-items-center gap-1">
      <a class="nav-link {% block nav_books %}{% endblock %}" href="{{ url_for('books.index') }}">书架</a>
      <a class="nav-link {% block nav_chars %}{% endblock %}" href="{{ url_for('characters.index') }}">人物</a>
      <!-- 世界观导航：无当前书时跳到书架，由书架/书目详情页进入世界观 -->
      <a class="nav-link {% block nav_world %}{% endblock %}"
         href="{{ url_for('world.index') }}">世界观</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
