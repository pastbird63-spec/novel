{% extends 'base.html' %}
{% block title %}编辑 {{ book.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<h2 class="mb-4">编辑书目</h2>
<form method="POST">
  <div class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">书名 <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">类型</label>
        <input type="text" name="genre" class="form-control" value="{{ book.genre or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">简介</label>
        <textarea name="description" class="form-control" rows="4">{{ book.description or '' }}</textarea>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('books.detail', id=book.id) }}" class="btn btn-outline-secondary">取消</a>
  </div>
</form>
</div>
</div>
{% endblock %}
