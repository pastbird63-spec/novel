{% extends 'base.html' %}
{% block title %}编辑 {{ setting.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<h2 class="mb-4">编辑设定</h2>
<form method="POST">
  <div class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">标题 <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" value="{{ setting.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">分类</label>
        <select name="category" class="form-select">
          {% for cat in categories %}
          <option value="{{ cat }}" {% if setting.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">关联书目（可选）</label>
        <select name="book_id" class="form-select">
          <option value="" {% if not setting.book_id %}selected{% endif %}>通用（不绑定书目）</option>
          {% for book in books %}
          <option value="{{ book.id }}" {% if setting.book_id == book.id %}selected{% endif %}>{{ book.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">内容</label>
        <textarea name="content" class="form-control" rows="8">{{ setting.content or '' }}</textarea>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">保存修改</button>
    <a href="{{ url_for('world.detail', setting_id=setting.id) }}" class="btn btn-outline-secondary">取消</a>
  </div>
</form>
</div>
</div>
{% endblock %}
