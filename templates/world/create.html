{% extends 'base.html' %}
{% block title %}新增世界观设定{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<h2 class="mb-4">新增世界观设定</h2>
<form method="POST">
  <div class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">标题 <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" required placeholder="如：龙族语言体系、魔法禁忌…">
      </div>
      <div class="mb-3">
        <label class="form-label">分类</label>
        <select name="category" class="form-select">
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">关联书目（可选）</label>
        <select name="book_id" class="form-select">
          <option value="">通用（不绑定书目）</option>
          {% for book in books %}
          <option value="{{ book.id }}" {% if preselected_book_id == book.id %}selected{% endif %}>{{ book.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">内容</label>
        <textarea name="content" class="form-control" rows="8" placeholder="详细描述这条设定…"></textarea>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('world.index') }}" class="btn btn-outline-secondary">取消</a>
  </div>
</form>
</div>
</div>
{% endblock %}
